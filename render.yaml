services:
  - type: web
    name: job-tracker
    env: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: job-tracker-db
          property: connectionString

databases:
  - name: job-tracker-db
    databaseName: job_tracker
    user: job_tracker_user
