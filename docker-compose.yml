version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: job-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: job_tracker
    ports:
      - "5432:5432"
    volumes:
      # Store data on host filesystem (easier to backup and access)
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Job Tracker Application (Optional - uncomment to run app in Docker too)
